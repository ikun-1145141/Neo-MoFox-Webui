name: Build and Deploy WebUI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'frontend/**'
      - 'Plugin/**'
      - '.github/workflows/build-and-deploy.yml'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史以便创建分支
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      
      - name: Copy build output to Plugin/static
        run: |
          # 创建静态目录（如果不存在）
          mkdir -p Plugin/static
          
          # 清空静态目录
          rm -rf Plugin/static/*
          
          # 复制编译产物
          cp -r frontend/dist/* Plugin/static/
          
          echo "Frontend build copied to Plugin/static"
          ls -la Plugin/static
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Deploy to static branch
        run: |
          # 静态文件分支名称
          STATIC_BRANCH="webui-static"
          
          # 检查远程分支是否存在
          if git ls-remote --heads origin $STATIC_BRANCH | grep -q $STATIC_BRANCH; then
            echo "Branch $STATIC_BRANCH exists, checking out"
            git fetch origin $STATIC_BRANCH
            git checkout $STATIC_BRANCH
            git pull origin $STATIC_BRANCH
            
            # 删除所有文件（但保留 .git）
            find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          else
            echo "Branch $STATIC_BRANCH does not exist, creating orphan branch"
            git checkout --orphan $STATIC_BRANCH
            
            # 删除所有从主分支带来的文件
            git rm -rf . 2>/dev/null || true
          fi
          
          # 从主分支复制 Plugin 目录和编译后的前端
          git checkout ${GITHUB_REF#refs/heads/} -- Plugin/
          
          # 确保静态文件已包含
          if [ ! -d "Plugin/static" ] || [ -z "$(ls -A Plugin/static)" ]; then
            echo "Error: Plugin/static is empty!"
            exit 1
          fi
          
          echo "Files to be committed:"
          ls -la Plugin/
          
          # 添加所有文件
          git add --all
          
          # 检查是否有变更
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # 提交变更
            COMMIT_MSG="Auto-build: Deploy frontend build from ${GITHUB_SHA:0:7}"
            git commit -m "$COMMIT_MSG"
            
            # 推送到静态分支
            git push origin $STATIC_BRANCH
            
            echo "Successfully deployed to $STATIC_BRANCH branch"
          fi
      
      - name: Create deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`webui-static\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${GITHUB_SHA:0:7}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Deploy Content" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "Plugin/" >> $GITHUB_STEP_SUMMARY
          echo "└── static/     (compiled frontend)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Clone Command" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "git clone -b webui-static https://github.com/${{ github.repository }}.git" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
