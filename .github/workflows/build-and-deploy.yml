name: Build and Publish WebUI Plugin

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

concurrency:
  group: webui-plugin-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Configure default Git branch name
        run: git config --global init.defaultBranch main

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Check recent source changes
        id: recent_changes
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Non-scheduled run, build will continue."
            exit 0
          fi

          if git log --since="24 hours ago" --invert-grep --author="github-actions\[bot\]" --pretty=format:'%H' -- frontend Plugin .github/workflows/build-and-deploy.yml | grep -q .; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Recent changes found, build will continue."
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes found in the last 24 hours, build will be skipped."
          fi

      - name: Setup Node.js
        if: steps.recent_changes.outputs.has_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        if: steps.recent_changes.outputs.has_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install frontend dependencies
        if: steps.recent_changes.outputs.has_changes == 'true'
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        if: steps.recent_changes.outputs.has_changes == 'true'
        working-directory: frontend
        run: npm run build

      - name: Install MPDT
        if: steps.recent_changes.outputs.has_changes == 'true'
        run: python -m pip install mofox-plugin-dev-toolkit

      - name: Configure MPDT GitHub token
        if: steps.recent_changes.outputs.has_changes == 'true'
        run: mpdt config edit github.token "${MPDT_GITHUB_TOKEN}"
        env:
          MPDT_GITHUB_TOKEN: ${{ secrets.MPDT_GITHUB_TOKEN }}

      - name: Configure Git
        if: steps.recent_changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump plugin patch version
        if: steps.recent_changes.outputs.has_changes == 'true'
        id: bump
        run: |
          OLD_VERSION=$(python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path('Plugin/manifest.json').read_text(encoding='utf-8'))
          print(manifest['version'])
          PY
          )

          mpdt plugin bump Plugin --type patch

          NEW_VERSION=$(python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path('Plugin/manifest.json').read_text(encoding='utf-8'))
          print(manifest['version'])
          PY
          )

          echo "old_version=${OLD_VERSION}" >> "$GITHUB_OUTPUT"
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Plugin version bumped: ${OLD_VERSION} -> ${NEW_VERSION}"

      - name: Commit version bump
        if: steps.recent_changes.outputs.has_changes == 'true'
        run: |
          git add Plugin/manifest.json

          if git diff --staged --quiet; then
            echo "No version change to commit"
          else
            git commit -m "Bump WebUI plugin to v${{ steps.bump.outputs.new_version }}"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Prepare release plugin directory
        if: steps.recent_changes.outputs.has_changes == 'true'
        run: |
          RELEASE_DIR="/tmp/webui-plugin-release"
          rm -rf "${RELEASE_DIR}"
          mkdir -p "${RELEASE_DIR}"

          cp -a Plugin/. "${RELEASE_DIR}/"
          rm -rf "${RELEASE_DIR}/static"
          mkdir -p "${RELEASE_DIR}/static"
          cp -r frontend/dist/* "${RELEASE_DIR}/static/"

          if [ ! -d "${RELEASE_DIR}/static" ] || [ -z "$(ls -A "${RELEASE_DIR}/static")" ]; then
            echo "Error: release static directory is empty!"
            exit 1
          fi

          echo "Release plugin directory prepared: ${RELEASE_DIR}"
          ls -la "${RELEASE_DIR}"
          ls -la "${RELEASE_DIR}/static"

      - name: 生成更新日志
        if: steps.recent_changes.outputs.has_changes == 'true'
        id: release_notes
        run: |
          NOTES_FILE="/tmp/webui-plugin-release-notes.md"
          SINCE_TIME=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ')

          {
            echo "自动构建提交：${GITHUB_SHA}"
            echo ""
            echo "## 最近 24 小时内的提交"
            echo ""
            git log --since="${SINCE_TIME}" --invert-grep --author="github-actions\[bot\]" --pretty=format:'- %h %s（%an）' || true
          } > "${NOTES_FILE}"

          if ! grep -q '^- ' "${NOTES_FILE}"; then
            echo "- 最近 24 小时内没有找到提交。" >> "${NOTES_FILE}"
          fi

          echo "notes_file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"
          cat "${NOTES_FILE}"

      - name: Sync latest branch state
        if: steps.recent_changes.outputs.has_changes == 'true'
        run: git pull --rebase --autostash origin ${{ github.ref_name }}

      - name: 发布插件市场更新包
        if: steps.recent_changes.outputs.has_changes == 'true'
        run: |
          mpdt market package-update /tmp/webui-plugin-release \
            --release-notes "$(cat '${{ steps.release_notes.outputs.notes_file }}')"

      - name: 生成发布摘要
        if: steps.recent_changes.outputs.has_changes == 'true'
        run: |
          echo "## 📦 WebUI 插件发布摘要" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **仓库地址**：https://github.com/ikun-1145141/Neo-MoFox-Webui/" >> "$GITHUB_STEP_SUMMARY"
          echo "- **源插件目录**：\`Plugin\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **发布插件目录**：\`/tmp/webui-plugin-release\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **旧版本**：\`${{ steps.bump.outputs.old_version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **新版本**：\`${{ steps.bump.outputs.new_version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **触发提交**：\`${GITHUB_SHA:0:7}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **状态**：✅ 已发布插件市场更新包" >> "$GITHUB_STEP_SUMMARY"

      - name: 生成跳过摘要
        if: steps.recent_changes.outputs.has_changes == 'false'
        run: |
          echo "## 📦 WebUI 插件发布摘要" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **状态**：⏭️ 最近 24 小时内没有相关提交，已跳过构建与发布" >> "$GITHUB_STEP_SUMMARY"
